# Fail2Ban filter for nginx bad requests
# Matches malformed HTTP requests and 400 errors

[Definition]
failregex = ^<HOST> .* "(GET|POST|PUT|DELETE|HEAD|OPTIONS|PATCH) .* HTTP/[0-9.]+" 400
            ^<HOST> .* "(GET|POST|PUT|DELETE|HEAD|OPTIONS|PATCH) .* HTTP/[0-9.]+" 444

ignoreregex =

datepattern = {^LN-BEG}%%ExY(?P<_sep>[-/.])%%m(?P=_sep)%%d[T ]%%H:%%M:%%S(?:[.,]%%f)?(?:\s*%%z)?
              ^[^	]*\t{^LN-BEG}
