# Fail2Ban filter for nginx 403 forbidden responses
# Blocks IPs that repeatedly trigger 403 errors

[Definition]
failregex = ^<HOST> .* "(GET|POST|PUT|DELETE|HEAD|OPTIONS|PATCH) .* HTTP/[0-9.]+" 403

ignoreregex =

datepattern = {^LN-BEG}%%ExY(?P<_sep>[-/.])%%m(?P=_sep)%%d[T ]%%H:%%M:%%S(?:[.,]%%f)?(?:\s*%%z)?
              ^[^	]*\t{^LN-BEG}
