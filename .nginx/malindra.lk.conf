# malindra.lk - Redirect to malindra.com

# HTTP redirect for malindra.lk and www.malindra.lk
server {
    listen 80;
    listen [::]:80;
    server_name malindra.lk www.malindra.lk;

    # For Certbot challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    return 301 https://malindra.com$request_uri;
}

# HTTPS redirect for malindra.lk and www.malindra.lk
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name malindra.lk www.malindra.lk;

    ssl_certificate /etc/letsencrypt/live/malindra.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/malindra.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://malindra.com$request_uri;
}
