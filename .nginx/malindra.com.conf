# malindra.com - Main Site Configuration

# HTTP to HTTPS redirect for malindra.com
server {
    listen 80;
    listen [::]:80;
    server_name malindra.com;

    # For Certbot challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    # Redirect to HTTPS
    return 301 https://malindra.com$request_uri;
}

# Main HTTPS server for malindra.com
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name malindra.com;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/malindra.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/malindra.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Download-Options "noopen" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # NOTE: Rate limiting should be configured in /etc/nginx/nginx.conf:
    # limit_req_zone $binary_remote_addr zone=general_limit:10m rate=10r/s;
    # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

    # Serve static site from Next.js export
    location / {
        root /home/www/sigint/out;
        try_files $uri $uri/ $uri.html /index.html;
        index index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Proxy to API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# www.malindra.com - Redirect to non-www

# HTTP redirect
server {
    listen 80;
    listen [::]:80;
    server_name www.malindra.com;

    # For Certbot challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    return 301 https://malindra.com$request_uri;
}

# HTTPS redirect
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.malindra.com;

    ssl_certificate /etc/letsencrypt/live/malindra.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/malindra.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://malindra.com$request_uri;
}
