services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sigint-db
    environment:
      POSTGRES_USER: ${DB_USER:-sigint}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sigint_secret}
      POSTGRES_DB: ${DB_NAME:-sigint}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sigint}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sigint-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sigint-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-sigint}:${DB_PASSWORD:-sigint_secret}@postgres:5432/${DB_NAME:-sigint}
      REDIS_URL: redis://redis:6379/0
      CONTENT_PATH: /app/content
    volumes:
      - ./models_cache:/root/.cache/huggingface
      - ../content:/app/content:ro
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
